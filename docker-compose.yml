
services:
  dnd-sheet:
    build: .
    container_name: dnd-sheet
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      JWT_SECRET: "BITTE_HIER_EIN_LANGES_ZUFAELLIGES_SECRET_EINTRAGEN"
      DB_PATH: "/app/data/app.db"
    volumes:
      - dnd_sheet_data:/app/data

volumes:
  dnd_sheet_data:
